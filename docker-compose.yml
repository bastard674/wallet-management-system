version : '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-container
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"
    volumes :
      - postgres_data:/var/lib/postgresql/data

  springboot:
    build: .
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker

    ports:
      - "8080:8080"

volumes:
  postgres_data:



